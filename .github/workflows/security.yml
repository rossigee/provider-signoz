# Standardized Security Template for Crossplane Providers
# Version: 2025-12-21 - Merged with CodeQL approach
#
# This template provides:
# - AUTOMATED security scanning on pushes/PRs (with no-op detection)
# - ON-DEMAND manual scanning (workflow_dispatch)
# - No scheduled scans to eliminate daily email spam
# - Comprehensive security analysis (CodeQL + gosec + govulncheck + trufflehog)
# - Supply chain security (OSV scanner + dependency review)
# - Results uploaded to GitHub Security tab

name: Security Scanning

on:
  # Automated on code changes (with no-op detection)
  push:
    branches:
      - master
      - release-*
  pull_request:
    branches:
      - master
      - release-*
  # Manual on-demand scanning
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan to run'
        required: false
        default: 'comprehensive'
        type: choice
        options:
          - comprehensive
          - vulnerabilities
          - secrets
          - dependencies
      notify_on_failure:
        description: 'Send notifications on scan failures'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write
  attestations: write
  pull-requests: write

env:
  GO_VERSION: '1.26.5'

jobs:
  detect-noop:
    runs-on: ubuntu-24.04
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          paths_ignore: '["**.md", "**.png", "**.jpg"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-24.04
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vendor Dependencies
        run: go mod vendor

      - name: Initialize CodeQL
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == ''
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-extended,security-and-quality

      - name: Autobuild for CodeQL
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == ''
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == ''
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

      - name: Run Go Vulnerability Check
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'vulnerabilities' || github.event.inputs.scan_type == ''
        run: |
          cp go.mod go.mod.bak && cp go.sum go.sum.bak
          GOWORK=$(mktemp -d) go install golang.org/x/vuln/cmd/govulncheck@v1.5.0 || { mv go.mod.bak go.mod 2>/dev/null; mv go.sum.bak go.sum 2>/dev/null; exit 1; }
          (GOFLAGS=-mod=mod GOWORK=$GOWORK go run -mod=mod golang.org/x/vuln/cmd/govulncheck ./... 2>&1 || true) | tee /tmp/govulncheck.out >/dev/null
          mv go.mod.bak go.mod && mv go.sum.bak go.sum
          if grep -q "^Vulnerability #" /tmp/govulncheck.out; then
            FIXED=$(grep -c "Fixed in: N/A" /tmp/govulncheck.out || true)
            TOTAL=$(grep -c "^Vulnerability #" /tmp/govulncheck.out || true)
            if [ "$FIXED" -lt "$TOTAL" ]; then
              echo "govulncheck: $TOTAL vulnerabilities found ($FIXED unfixable, $((TOTAL - FIXED)) fixable)"
              rm -f /tmp/govulncheck.out; exit 1
            else
              echo "govulncheck: $TOTAL unfixable vulnerabilities (no fix available), ignoring"
            fi
          else
            echo "No vulnerabilities found."
          fi
          rm -f /tmp/govulncheck.out

      - name: Run Gosec Security Scanner
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'vulnerabilities' || github.event.inputs.scan_type == ''
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'
        continue-on-error: true

      - name: Fix Gosec SARIF format
        if: (github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'vulnerabilities' || github.event.inputs.scan_type == '') && always() && hashFiles('gosec-results.sarif') != ''
        run: |
          if [ -f gosec-results.sarif ]; then
            jq '.runs[].results[].locations[].physicalLocation.artifactLocation.uri |= if . == null or . == "" then "." else . end' gosec-results.sarif > gosec-results-fixed.sarif
            mv gosec-results-fixed.sarif gosec-results.sarif
          fi

      - name: Upload Gosec Results
        if: (github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'vulnerabilities' || github.event.inputs.scan_type == '') && always() && hashFiles('gosec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: Check for secrets with TruffleHog
        if: github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'secrets' || github.event.inputs.scan_type == ''
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: master
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  supply-chain-scan:
    name: Supply Chain Security
    runs-on: ubuntu-24.04
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true' && (github.event.inputs.scan_type == 'comprehensive' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == '')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check for known malicious packages
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=go.sum --format=sarif --output=osv-results.sarif || true

      - name: Upload OSV scan results
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0

  notification:
    name: Security Scan Notification
    runs-on: ubuntu-24.04
    needs: [security-analysis, supply-chain-scan]
    if: always() && github.event.inputs.notify_on_failure == 'true'
    steps:
      - name: Check Results and Notify
        run: |
          echo "Security Analysis Result: ${{ needs.security-analysis.result }}"
          echo "Supply Chain Scan Result: ${{ needs.supply-chain-scan.result }}"

          if [[ "${{ needs.security-analysis.result }}" == "failure" ]] || [[ "${{ needs.supply-chain-scan.result }}" == "failure" ]]; then
            echo "Security scan detected issues"
            echo "Check the Security tab in GitHub for detailed results"
            echo "Repository: ${{ github.repository }}"
            echo "Run ID: ${{ github.run_id }}"
          else
            echo "Security scan completed successfully"
            echo "No critical security issues detected"
          fi

# Key Principles for this Template:
#
# 1. AUTOMATED WITH NO-OP DETECTION
#    - Triggers on pushes/PRs to master/release-* with skip-duplicate-actions
#    - Manual trigger available for custom scans
#    - No scheduled scans to avoid email spam
#
# 2. COMPREHENSIVE SECURITY COVERAGE
#    - CodeQL static analysis for Go code
#    - Go vulnerability scanning (govulncheck)
#    - Security scanning (gosec)
#    - Secret detection (trufflesecurity/trufflehog)
#    - Supply chain security (OSV scanner)
#    - Dependency review with license checking
#
# 3. FLEXIBLE SCAN TYPES
#    - Comprehensive (all scans)
#    - Vulnerabilities (govulncheck + gosec)
#    - Secrets (trufflehog)
#    - Dependencies (OSV + dependency review)
#
# 4. PROPER RESULTS HANDLING
#    - SARIF format uploads for GitHub Security tab
#    - Proper error handling and continue-on-error for scans
#    - Clear notifications when enabled
#
# 5. STANDARDIZED VERSION
#    - Go 1.26.4
#    - Actions: checkout@v4, setup-go@v6, codeql-action@v6
#    - Runners: ubuntu-24.04
#
# To apply this template:
# 1. Copy to .github/workflows/security.yml
# 2. Run on pushes to master/release-* or manually via Actions UI
# 3. View results in Security tab (no email spam!)
# 4. Use scan_type inputs for targeted scans when needed